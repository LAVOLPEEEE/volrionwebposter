<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Модель с анимацией</title>
    <link rel="stylesheet" href="stylesheets/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  </head>
  <body>
    <section>
      <div class="scene">
        <canvas id="canvas"></canvas>
        <div class="big-overlay-texts">
          <div class="big-overlay-text-top">разгадай</div>
          <div class="big-overlay-text-bottom">меня</div>
        </div>
        <div class="letters">
          <span class="toh letter1">#</span>
          <span class="toh letter2">%</span>
          <span class="toh letter3">!</span>
          <span class="toh letter4">7</span>
          <span class="toh letter5">%</span>
          <span class="toh letter6">!</span>
          <span class="toh letter7">+</span>
          <span class="toh letter8">5</span>
          <span class="toh letter9">$</span>
          <span class="toh letter10">?</span>
          <span class="toh letter11">*</span>
          <span class="toh letter12">!</span>
          <span class="toh letter13">%</span>
          <span class="toh letter14">?</span>
          <span class="toh letter15">2</span>
          <span class="toh letter16">#</span>
          <span class="toh letter17">+</span>
          <span class="toh letter18">$</span>
          <span class="toh letter19">4</span>
        </div>
      </div>
    </section>

    <section class="transition1">
      <div class="transition1_1"></div>
    </section>

    <section class="first_game">
      <div class="big_flex_first_game">
        <div class="left_flex_first_game">
          <div class="text">
            <p id="text_left_top_1">
              Сопоставь знаки и буквы.  <br />Кликай — услышишь уникальный звук!
            </p>
          </div>
          <div class="screen_with_progressbar">
            <div class="screen"></div>
            <div class="progressbar"></div>
          </div>
        </div>
        <div class="right_flex_first_game">
          <div class="top_keyboard_with_text">
            <div class="text_right_top">
              <p id="text_right_top_1">Буквы</p>
            </div>
            <div class="top_keyboard">
              <div class="top_keyboard_firstline_buttons">
                <img
                  class="btn"
                  src="static/images/button1.svg"
                  alt=""
                  data-letter="э"
                />
                <img
                  class="btn"
                  src="static/images/button2.svg"
                  alt=""
                  data-letter="о"
                />
                <img
                  class="btn"
                  src="static/images/button3.svg"
                  alt=""
                  data-letter="м"
                />
                <img
                  class="btn"
                  src="static/images/button4.svg"
                  alt=""
                  data-letter="к"
                />
                <img
                  class="btn"
                  src="static/images/button5.svg"
                  alt=""
                  data-letter="р"
                />
              </div>
              <div class="lines_keyboard_1">
                <img
                  class="line_keyboard_1"
                  src="static/images/line_keyboard.svg"
                  alt=""
                />
              </div>
              <div class="top_keyboard_secondline_buttons">
                <img
                  class="btn"
                  src="static/images/button6.svg"
                  alt=""
                  data-letter="г"
                />
                <img
                  class="btn"
                  src="static/images/button7.svg"
                  alt=""
                  data-letter="и"
                />
                <img
                  class="btn"
                  src="static/images/button8.svg"
                  alt=""
                  data-letter="ч"
                />
                <img
                  class="btn"
                  src="static/images/button9.svg"
                  alt=""
                  data-letter="у"
                />
                <img
                  class="btn"
                  src="static/images/button10.svg"
                  alt=""
                  data-letter="ъ"
                />
              </div>
              <div class="lines_keyboard_2">
                <img
                  class="line_keyboard_2"
                  src="static/images/line_keyboard2.svg"
                  alt=""
                />
              </div>
            </div>
          </div>
          <div class="bottom_keyboard_with_text">
            <div class="text_right_bottom">
              <p id="text_right_botton_1">Символы</p>
            </div>
            <div class="bottom_keyboard">
              <div class="bottom_keyboard_firstline_buttons">
                <img
                  class="btn"
                  src="static/images/button11.svg"
                  alt=""
                  data-letter="?"
                />
                <img
                  class="btn"
                  src="static/images/button12.svg"
                  alt=""
                  data-letter="#"
                />
                <img
                  class="btn"
                  src="static/images/button13.svg"
                  alt=""
                  data-letter="!"
                />
                <img
                  class="btn"
                  src="static/images/button14.svg"
                  alt=""
                  data-letter="+"
                />
                <img
                  class="btn"
                  src="static/images/button15.svg"
                  alt=""
                  data-letter="*"
                />
              </div>
              <div class="lines_keyboard_3">
                <img
                  class="line_keyboard_3"
                  src="static/images/line_keyboard.svg"
                  alt=""
                />
              </div>
              <div class="bottom_keyboard_secondline_buttons">
                <img
                  class="btn"
                  src="static/images/button16.svg"
                  alt=""
                  data-letter="1"
                />
                <img
                  class="btn"
                  src="static/images/button17.svg"
                  alt=""
                  data-letter="2"
                />
                <img
                  class="btn"
                  src="static/images/button18.svg"
                  alt=""
                  data-letter="3"
                />
                <img
                  class="btn"
                  src="static/images/button19.svg"
                  alt=""
                  data-letter="4"
                />
                <img
                  class="btn"
                  src="static/images/button20.svg"
                  alt=""
                  data-letter="5"
                />
              </div>
              <div class="lines_keyboard_4">
                <img
                  class="line_keyboard_4"
                  src="static/images/line_keyboard2.svg"
                  alt=""
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="transition2">
      <div class="transition2_1"></div>
    </section>
    <section class="second_game">
      <div class="big_flex_second_game">
        <div class="left_flex_second_game">
          <div class="msg_alphabet_button">
            <div class="msg2">
              <p>
                Составь слово по переводу. <br />Перетаскивай символы <br />в
                правильном порядке!
              </p>
            </div>
            <div class="alphabet_button"></div>
          </div>
          <div class="words_answer">
            <div class="words">
              <div class="word1"></div>
              <div class="word2"></div>
              <div class="word3">
                <img
                  class="letter1_3"
                  src="static/images/letter1_3.svg"
                  alt=""
                />
                <img
                  class="letter2_3"
                  src="static/images/letter2_3.svg"
                  alt=""
                />
                <img
                  class="letter3_3"
                  src="static/images/letter3_3.svg"
                  alt=""
                />
                <img
                  class="letter4_3"
                  src="static/images/letter4_3.svg"
                  alt=""
                />
                <img
                  class="letter5_3"
                  src="static/images/letter5_3.svg"
                  alt=""
                />
                <img
                  class="letter6_3"
                  src="static/images/letter6_3.svg"
                  alt=""
                />
              </div>
            </div>
            <div class="answers">
              <div class="answer_second_game1"></div>
              <div class="answer_second_game2"></div>
              <div class="answer_second_game3"></div>
            </div>
          </div>
        </div>
        <div class="right_flex_second_game">
          <img class="letter_о1" src="static/images/letter_o.svg" alt="" />
          <img class="letter_ye1" src="static/images/letter_ye.svg" alt="" />
          <img class="letter_t1" src="static/images/letter_t.svg" alt="" />
          <img class="letter_v1" src="static/images/letter_v.svg" alt="" />
          <img class="letter_b1" src="static/images/letter_b.svg" alt="" />
          <img class="letter_k1" src="static/images/letter_k.svg" alt="" />
          <img class="letter_о2" src="static/images/letter_o.svg" alt="" />
          <img class="letter_ya1" src="static/images/letter_ya.svg" alt="" />
          <img class="letter_ts1" src="static/images/letter_ts.svg" alt="" />
          <img class="letter_b2" src="static/images/letter_b.svg" alt="" />
          <img class="letter_yo1" src="static/images/letter_yo.svg" alt="" />
          <img class="letter_z1" src="static/images/letter_z.svg" alt="" />
          <img class="letter_ye2" src="static/images/letter_ye.svg" alt="" />
          <img class="letter_a1" src="static/images/letter_a.svg" alt="" />
          <img class="letter_о3" src="static/images/letter_o.svg" alt="" />
          <img class="letter_r1" src="static/images/letter_r.svg" alt="" />
          <img class="letter_l1" src="static/images/letter_l.svg" alt="" />
          <img class="letter_k2" src="static/images/letter_k.svg" alt="" />
        </div>
      </div>
    </section>
    <section class="transition3">
      <div class="transition3_1"></div>
    </section>
    <section class="third_game">
      <div class="big_flex_third_game"></div>
    </section>
    <script src="javascripts/model.js"></script>
    <script src="javascripts/letters.js"></script>
    <script src="javascripts/alphabet.js"></script>
    <script src="javascripts/first_game.js"></script>
  </body>
</html>
